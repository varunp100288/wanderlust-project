version: "3.8"

services:
  backend:
    image: 834732843065.dkr.ecr.us-east-1.amazonaws.com/wanderlust-backend:${IMAGE_TAG}
    container_name: backend
    expose:
      - "5000"
    environment:
      - MONGODB_URI=mongodb://mongo:27017/wanderlust
    depends_on:
      - mongo
    restart: always

  frontend:
    image: 834732843065.dkr.ecr.us-east-1.amazonaws.com/wanderlust-frontend:${IMAGE_TAG}
    container_name: frontend
    expose:
      - "80"
    depends_on:
      - backend
    restart: always

  nginx:
    image: nginx:alpine
    container_name: nginx
    ports:
      - "80:80"
    volumes:
      - /home/ubuntu/projects/wanderlust/nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - frontend
      - backend
    restart: always

  mongo:
    image: mongo:6
    container_name: mongo
    restart: always
    volumes:
      - mongo_data:/data/db

volumes:
  mongo_data: