events {}

http {
    include       /etc/nginx/mime.types; # Yeh line hona bahut zaruri hai
    default_type  application/octet-stream;

    server {
        listen 80;

        location / {
            root /usr/share/nginx/html;
            index index.html index.htm;
            # Yeh line fix karegi: Agar file na mile toh index.html par jaye
            try_files $uri $uri/ /index.html; 
        }

        location /api/ {
            proxy_pass http://backend:5000/; # Trailing slash zaroori hai
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}